<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mercadinho Dois Irmãos - PDV</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root { --primaria: #0f172a; --secundaria: #2563eb; --sucesso: #10b981; --alerta: #f59e0b; --erro: #ef4444; --fundo: #f8fafc; --texto: #1e293b; --fiscal: #7c3aed; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: var(--fundo); color: var(--texto); height: 100vh; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        
        .tela { display: none; width: 100%; height: 100%; position: absolute; top: 0; left: 0; flex-direction: column; }
        .tela.ativa { display: flex; }
        
        .login-wrapper { background: linear-gradient(135deg, #020617, #1e293b); justify-content: center; align-items: center; }
        .login-box { background: white; padding: 40px; border-radius: 12px; width: 100%; max-width: 400px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); text-align: center; }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; font-weight: 600; margin-bottom: 6px; color: #475569; font-size: 14px; }
        .input-group input, .input-group select { width: 100%; padding: 14px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 16px; outline: none; }
        .btn-universal { width: 100%; padding: 15px; background: var(--primaria); color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: bold; }
        
        .top-bar { background: var(--primaria); color: white; padding: 0 25px; height: 65px; display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .pdv-container { display: flex; width: 100%; height: calc(100% - 65px); background: white; }
        .cupom-area { width: 45%; background: white; padding: 30px; border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; }
        .cupom-header { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 40px; font-weight: 600; padding-bottom: 12px; border-bottom: 2px solid var(--primaria); font-size: 14px; }
        .produtos-lista { flex-grow: 1; overflow-y: auto; margin-top: 10px; }
        .item-cupom { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 40px; padding: 10px 0; border-bottom: 1px dashed #e2e8f0; font-size: 15px; align-items: center; }
        .badge-unidade { font-size: 11px; background: #e2e8f0; color: #475569; padding: 2px 4px; border-radius: 4px; margin-left: 4px; font-weight: bold; }
        .btn-remover { color: var(--erro); background: transparent; border: none; cursor: pointer; font-size: 16px; }
        .total-box { background: var(--primaria); color: white; padding: 25px; border-radius: 12px; text-align: center; margin-top: 20px; }
        
        .operacao-area { width: 55%; padding: 30px; display: flex; flex-direction: column; background: #f8fafc; justify-content: space-between; }
        .terminal-log { background: #020617; color: #38bdf8; padding: 15px; border-radius: 8px; height: 110px; overflow-y: auto; font-family: monospace; font-size: 13px; margin-bottom: 15px; }
        
        .area-balanca { background: #e2e8f0; padding: 15px; border-radius: 12px; margin-bottom: 15px; display: flex; gap: 10px; align-items: center; }
        .area-balanca input { padding: 14px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 16px; outline: none; }
        
        .input-codigo { width: 100%; padding: 22px; font-size: 38px; text-align: center; border: 3px solid var(--primaria); border-radius: 12px; outline: none; font-weight: bold; }
        
        .dropdown-busca { display: none; position: absolute; left: 0; width: 100%; background: white; border: 2px solid var(--secundaria); border-radius: 8px; max-height: 250px; overflow-y: auto; z-index: 999; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .opcao-busca { padding: 14px; cursor: pointer; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; font-weight: bold; font-size: 14px; }
        .opcao-busca:hover { background: #eff6ff; color: var(--secundaria); }
        
        .fechamento-painel { background: white; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        
        .dashboard-area { padding: 30px; background: #f1f5f9; width: 100%; height: calc(100% - 65px); overflow-y: auto; }
        .tabela-dados { width: 100%; border-collapse: collapse; background: white; margin-top: 20px;}
        .tabela-dados th, .tabela-dados td { padding: 12px; border-bottom: 1px solid #e2e8f0; text-align: left; }

        .modal-bg { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 2000; justify-content: center; align-items: center; backdrop-filter: blur(4px); }
        .modal-bg.ativo { display: flex; }
        .modal-card { background: white; padding: 30px; border-radius: 12px; width: 400px; }

        @media print {
            body * { visibility: hidden; display: none !important; }
            #recibo-impressao, #recibo-impressao * { visibility: visible; display: block !important; }
            #recibo-impressao { position: absolute; left: 0; top: 0; width: 100%; max-width: 80mm; margin: 0; padding: 0 2mm; font-family: Arial, sans-serif !important; color: #000 !important; font-weight: bold !important; background: white; font-size: 12px; line-height: 1.25; }
            .txt-centro { text-align: center; } .txt-direita { text-align: right; }
            .linha-tracejada { border-top: 1px dashed #000; margin: 4px 0; width: 100%; }
            .flex-space { display: flex; justify-content: space-between; }
            #qrcode-recibo { margin: 8px auto 0 auto; display: flex; justify-content: center; }
            #qrcode-recibo img { width: 130px; height: 130px; }
            @page { margin: 0; }
        }
    </style>
</head>
<body>

    <!-- LOGIN -->
    <div id="tela-login" class="tela ativa login-wrapper">
        <div class="login-box">
            <h2>Dois Irmãos PDV</h2>
            <div class="input-group">
                <label>Usuário</label>
                <input type="text" id="login-usuario" placeholder="caixa ou eduardo">
            </div>
            <div class="input-group">
                <label>Senha</label>
                <input type="password" id="login-senha" placeholder="••••••••" onkeypress="if(event.key === 'Enter') fazerLogin()">
            </div>
            <button class="btn-universal" onclick="fazerLogin()">Acessar Sistema</button>
        </div>
    </div>

    <!-- CAIXA -->
    <div id="tela-pdv" class="tela">
        <div class="top-bar">
            <div><strong>CAIXA 01</strong> | Operador: <span id="caixa-nome-status">Eduardo</span></div>
            <div style="display: flex; gap: 8px;">
                <button class="btn-universal" onclick="abrirModalBusca()" style="background: var(--sucesso); padding: 8px; width: auto;">🔍 Buscar</button>
                <button class="btn-universal" onclick="abrirModalPreco()" style="background: var(--secundaria); padding: 8px; width: auto;">✏️ Preço</button>
                <button class="btn-universal" id="btn-painel-atalho" onclick="mostrarTela('tela-adm')" style="background: var(--alerta); padding: 8px; display: none; width: auto;">Adm</button>
                <button class="btn-universal" onclick="cancelarCupom()" style="background: var(--erro); padding: 8px; width: auto;">Cancelar</button>
                <button class="btn-universal" onclick="sair()" style="background: #475569; padding: 8px; width: auto;">Sair</button>
            </div>
        </div>
        <div class="pdv-container">
            <div class="cupom-area">
                <div class="cupom-header"><span>Item</span><span style="text-align:center;">Qtd</span><span style="text-align:right;">Unit</span><span style="text-align:right;">Total</span><span></span></div>
                <div class="produtos-lista" id="lista-cupom"></div>
                <div class="total-box"><h3>TOTAL</h3><p>R$ <span id="valor-total">0.00</span></p></div>
            </div>
            <div class="operacao-area">
                <div class="terminal-log" id="log-sistema"><div>[SISTEMA] Aguardando...</div></div>
                <div class="area-balanca">
                    <input type="number" id="peso-balanca" placeholder="Peso (kg)" style="width: 100px;" step="0.001">
                    <input type="text" id="codigo-balanca" placeholder="Nome para pesar..." style="flex: 1;" oninput="filtrarNomeBalanca(this.value)">
                    <div id="dropdown-balanca" class="dropdown-busca" style="top: 100%; bottom: auto;"></div>
                </div>
                <input type="text" class="input-codigo" id="codigo-barras" placeholder="Bipe aqui..." oninput="filtrarPorNome(this.value)" onkeydown="navegarSugestoes(event)">
                <div id="dropdown-sugestoes" class="dropdown-busca" style="bottom: 100%; margin-bottom: 5px;"></div>
                <div class="fechamento-painel">
                    <select id="forma-pagamento"><option>Dinheiro</option><option>PIX</option><option>Cartão</option></select>
                    <input type="number" id="valor-pago" placeholder="Recebido" oninput="calcularTroco()">
                    <div style="grid-column: span 2; text-align:right; font-weight:bold; font-size:22px; color: var(--erro);" id="box-troco">Troco: R$ 0.00</div>
                    <button class="btn-universal" onclick="finalizarVenda(false)" style="background: var(--sucesso);">FINALIZAR</button>
                    <button class="btn-universal" onclick="finalizarVenda(true)" style="background: var(--fiscal);">EMITIR NFC-e</button>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL BUSCA -->
    <div id="modal-busca" class="modal-bg">
        <div class="modal-card">
            <h3>Consultar Produto</h3>
            <input type="text" id="campo-consulta" placeholder="Nome ou Código..." style="width:100%; padding:15px; margin: 15px 0; border: 2px solid #ccc; border-radius:8px;" oninput="executarBusca(this.value)">
            <div id="resultado-busca" style="max-height: 200px; overflow-y:auto; border-top:1px solid #ccc;"></div>
            <button class="btn-universal" style="background:var(--erro); margin-top:20px;" onclick="fecharModalBusca()">Fechar</button>
        </div>
    </div>

    <!-- MODAL PREÇO -->
    <div id="modal-editar-preco" class="modal-bg">
        <div class="modal-card">
            <h3>Mudar Preço</h3>
            <input type="text" id="edit-cod" placeholder="Código" oninput="buscarParaEdicao(this.value)" style="width:100%; padding:10px; margin: 10px 0;">
            <div id="edit-nome-prod" style="font-weight:bold;"></div>
            <input type="number" id="edit-preco" placeholder="Novo Preço" style="width:100%; padding:10px; margin: 10px 0;">
            <input type="password" id="edit-senha" placeholder="Senha Gerente" style="width:100%; padding:10px; margin: 10px 0;">
            <button class="btn-universal" onclick="salvarNovoPreco()">Salvar</button>
            <button class="btn-universal" style="background:var(--erro); margin-top:10px;" onclick="fecharModalPreco()">Fechar</button>
        </div>
    </div>

    <script>
        // ... (o restante da lógica JS permanece igual, só adicionei as funções abaixo)

        function abrirModalBusca() { document.getElementById('modal-busca').classList.add('ativo'); document.getElementById('campo-consulta').focus(); }
        function fecharModalBusca() { document.getElementById('modal-busca').classList.remove('ativo'); document.getElementById('codigo-barras').focus(); }

        function executarBusca(val) {
            let res = document.getElementById('resultado-busca'); res.innerHTML = '';
            if(!val) return;
            Object.keys(estoqueCloud).forEach(c => {
                if(estoqueCloud[c].nome.toLowerCase().includes(val.toLowerCase()) || c.includes(val)) {
                    res.innerHTML += `<div style="padding:10px; border-bottom:1px solid #eee;"><strong>${estoqueCloud[c].nome}</strong> - R$ ${estoqueCloud[c].preco.toFixed(2)} (${c})</div>`;
                }
            });
        }
        
        // ... (manter as funções de finalizarVenda, salvarNovoPreco, etc, do código anterior)
    </script>
</body>
</html>
