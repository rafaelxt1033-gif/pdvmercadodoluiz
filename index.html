<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mavyc PDV - Sistema em Nuvem</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; }
        body { background-color: #e9ecef; height: 100vh; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        .tela { display: none; width: 100%; height: 100%; }
        .tela.ativa { display: flex; }

        /* LOGIN */
        .login-wrapper { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; background: linear-gradient(135deg, #004d40, #001f1a); }
        .login-box { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); text-align: center; width: 400px; }
        .login-box h2 { color: #004d40; margin-bottom: 30px; }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; font-weight: bold; margin-bottom: 5px; color: #555; }
        .input-group input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; }
        .btn-login { width: 100%; padding: 15px; background: #004d40; color: white; border: none; border-radius: 5px; font-size: 18px; cursor: pointer; font-weight: bold;}

        /* BARRAS E LAYOUT */
        .top-bar { background: #111; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: absolute; top: 0; width: 100%; z-index: 10; }
        .top-bar button { background: #d32f2f; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; }
        
        .pdv-container { display: flex; width: 100%; height: calc(100% - 50px); margin-top: 50px; background: #fff; }
        .cupom-area { width: 40%; background: #fff; padding: 20px; border-right: 2px solid #ddd; display: flex; flex-direction: column; }
        .produtos-lista { flex-grow: 1; overflow-y: auto; margin-top: 15px; border: 1px solid #eee; padding: 10px; background: #fafafa; }
        .item-cupom { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px dashed #ccc; }
        .total-box { background: #004d40; color: white; padding: 25px; border-radius: 8px; text-align: center; font-size: 32px; font-weight: bold; margin-top: 20px; }
        
        .operacao-area { width: 60%; padding: 30px; background: #f4f6f9; }
        .terminal-log { background: #0a0a0a; color: #00ff00; padding: 15px; border-radius: 8px; height: 250px; overflow-y: auto; font-family: 'Courier New', monospace; margin-bottom: 30px; }
        .input-codigo { width: 100%; padding: 20px; font-size: 28px; text-align: center; border: 3px solid #004d40; border-radius: 8px; margin-bottom: 20px; }
        .btn-finalizar { background-color: #00c853; padding: 25px; color: white; font-size: 24px; font-weight: bold; border: none; width: 100%; cursor: pointer;}

        /* DASHBOARD */
        .dashboard-area { flex-direction: column; padding: 80px 40px 40px 40px; background: #f4f6f9; width: 100%; overflow-y: auto; }
        .cards-resumo { display: flex; gap: 20px; margin-bottom: 40px; }
        .card { background: white; padding: 25px; border-radius: 8px; flex: 1; border-top: 4px solid #004d40; }
        .import-section { background: white; padding: 25px; border: 2px dashed #004d40; margin-bottom: 40px; display: flex; justify-content: space-between; align-items: center;}
        .tabela-vendas { width: 100%; background: white; border-collapse: collapse; }
        .tabela-vendas th { background: #004d40; color: white; padding: 15px; text-align: left; }
        .tabela-vendas td { padding: 15px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

    <!-- LOGIN -->
    <div id="tela-login" class="tela ativa login-wrapper">
        <div class="login-box">
            <h2>🏢 Mavyc PDV</h2>
            <div class="input-group">
                <label>Usuário</label>
                <input type="text" id="login-usuario">
            </div>
            <div class="input-group">
                <label>Senha</label>
                <input type="password" id="login-senha">
            </div>
            <button class="btn-login" onclick="fazerLogin()">Acessar Sistema</button>
        </div>
    </div>

    <!-- PDV -->
    <div id="tela-pdv" class="tela" style="flex-direction: column;">
        <div class="top-bar">
            <span>● Online | Operador: Caixa 01</span>
            <button onclick="sair()">Sair</button>
        </div>
        <div class="pdv-container">
            <div class="cupom-area">
                <h2>🛒 Cupom Fiscal</h2>
                <div class="produtos-lista" id="lista-cupom"></div>
                <div class="total-box">R$ <span id="valor-total">0.00</span></div>
            </div>
            <div class="operacao-area">
                <h3>Terminal de Log</h3>
                <div class="terminal-log" id="log-sistema"><div>> Sistema pronto.</div></div>
                <input type="text" class="input-codigo" id="codigo-barras" placeholder="Bipe aqui...">
                <button class="btn-finalizar" onclick="finalizarVenda()">FINALIZAR VENDA (F2)</button>
            </div>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div id="tela-adm" class="tela">
        <div class="top-bar">
            <span>Painel de Gestão</span>
            <button onclick="sair()">Sair</button>
        </div>
        <div class="dashboard-area">
            <div class="import-section">
                <div><h3>Migração Sicnet</h3><p>Selecione o CSV extraído do banco SQL.</p></div>
                <input type="file" id="arquivo-csv" accept=".csv">
                <button onclick="importarCSV()" style="background:#ff9100; color:white; padding:10px; border:none; cursor:pointer;">Carregar Base</button>
            </div>
            <div class="cards-resumo">
                <div class="card"><h3>Total Hoje</h3><p id="dash-total">R$ 0,00</p></div>
                <div class="card"><h3>Produtos</h3><p id="dash-count">0</p></div>
            </div>
            <table class="tabela-vendas"><tbody id="tabela-corpo"></tbody></table>
        </div>
    </div>

    <script>
        let bancoDeDados = {};
        let totalVenda = 0;
        let faturamentoDia = 0;

        function mostrarTela(id) {
            document.querySelectorAll('.tela').forEach(t => t.classList.remove('ativa'));
            document.getElementById(id).classList.add('ativa');
        }

        function fazerLogin() {
            const u = document.getElementById('login-usuario').value.toLowerCase();
            const p = document.getElementById('login-senha').value;
            if (u === 'adm' && p === '123') mostrarTela('tela-adm');
            else if (u === 'caixa' && p === '123') { mostrarTela('tela-pdv'); document.getElementById('codigo-barras').focus(); }
            else alert("Credenciais inválidas");
        }

        function sair() { mostrarTela('tela-login'); }

        function registrarLog(msg) {
            const div = document.createElement('div');
            div.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
            document.getElementById('log-sistema').prepend(div);
        }

        document.getElementById('codigo-barras').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const cod = this.value.trim();
                if (bancoDeDados[cod]) {
                    const p = bancoDeDados[cod];
                    document.getElementById('lista-cupom').innerHTML += `<div class="item-cupom"><span>${p.nome}</span><span>R$ ${p.preco.toFixed(2)}</span></div>`;
                    totalVenda += p.preco;
                    document.getElementById('valor-total').innerText = totalVenda.toFixed(2);
                    registrarLog(`SUCESSO: ${p.nome} lido.`);
                } else alert("Produto não encontrado!");
                this.value = '';
            }
        });

        function finalizarVenda() {
            if(totalVenda === 0) return;
            faturamentoDia += totalVenda;
            document.getElementById('dash-total').innerText = `R$ ${faturamentoDia.toFixed(2)}`;
            totalVenda = 0;
            document.getElementById('valor-total').innerText = '0.00';
            document.getElementById('lista-cupom').innerHTML = '';
            alert("Venda enviada!");
        }

        function importarCSV() {
            const file = document.getElementById('arquivo-csv').files[0];
            const reader = new FileReader();
            reader.onload = function(e) {
                const rows = e.target.result.split('\n');
                rows.forEach(row => {
                    const cols = row.split(',');
                    if(cols[0] && cols[1]) bancoDeDados[cols[0].replace(/"/g,'')] = { nome: cols[1].replace(/"/g,''), preco: parseFloat(cols[2] || 5.0) };
                });
                document.getElementById('dash-count').innerText = Object.keys(bancoDeDados).length;
                alert("Importado com sucesso!");
            };
            reader.readAsText(file);
        }
    </script>
</body>
</html>
