<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Mercadinho Dois Irmãos - PDV Pro</title>
    <style>
        :root { --primaria: #004d40; --secundaria: #ff9100; --fundo: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--fundo); margin: 0; }
        
        /* LOGIN ESTRUTURA */
        #login-screen { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--primaria); display: flex; justify-content:center; align-items:center; z-index:1000; }
        .login-box { background: white; padding: 40px; border-radius: 10px; width: 350px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        
        /* PDV ESTRUTURA */
        #app-screen { display: none; height: 100vh; flex-direction: column; }
        header { background: var(--primaria); color: white; padding: 20px; text-align: center; font-size: 28px; font-weight: bold; }
        .main-content { display: flex; flex: 1; padding: 20px; gap: 20px; }
        .pdv-painel { flex: 2; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .admin-painel { flex: 1; background: #fff; padding: 30px; border-radius: 10px; border-left: 5px solid var(--secundaria); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        
        input { padding: 15px; font-size: 18px; width: 100%; border: 2px solid #ddd; border-radius: 6px; margin-bottom: 10px; }
        button { padding: 15px 25px; cursor: pointer; background: var(--primaria); color: white; border: none; border-radius: 6px; font-weight: bold; width: 100%; font-size: 16px; }
        button:hover { opacity: 0.9; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border-bottom: 1px solid #eee; padding: 15px; text-align: left; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h2>🔐 Acesso Restrito</h2>
        <p>Mercadinho Dois Irmãos</p>
        <input type="password" id="senha-acesso" placeholder="Digite a senha do sistema">
        <button onclick="verificarLogin()">Entrar no Sistema</button>
    </div>
</div>

<div id="app-screen">
    <header>Mercadinho Dois Irmãos - PDV Pro</header>
    <main class="main-content">
        <div class="pdv-painel">
            <input type="text" id="leitor" placeholder="Bipe ou digite o código..." autofocus onkeypress="handleScan(event)">
            <table id="tabela-cupom"><thead><tr><th>Produto</th><th>Preço</th></tr></thead><tbody></tbody></table>
            <h2 id="total" style="margin-top: 20px; font-size: 32px; color: var(--primaria);">Total: R$ 0.00</h2>
            <button onclick="finalizarVenda()" style="background: #c62828; margin-top: 20px;">FINALIZAR VENDA</button>
        </div>
        <div class="admin-painel">
            <h2>Gestão de Estoque</h2>
            <p>Carregue os CSVs do Sicnet aqui:</p>
            <label>1. Tabela Nomes (TABPRECONOME):</label>
            <input type="file" onchange="importarCSV(event, 'nomes')">
            <label>2. Tabela Preços (TABPRECOPROD):</label>
            <input type="file" onchange="importarCSV(event, 'precos')">
            <button onclick="sair()" style="background:#666; margin-top:20px;">Sair do Sistema</button>
        </div>
    </main>
</div>

<script>
    let banco = {}; 
    let carrinho = [];
    let total = 0;

    function verificarLogin() {
        if(document.getElementById('senha-acesso').value === "123") {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-screen').style.display = 'flex';
        } else { alert("Senha incorreta!"); }
    }

    function sair() { location.reload(); }

    function handleScan(e) {
        if (e.key === 'Enter') {
            const cod = document.getElementById('leitor').value.trim();
            if (banco[cod]) {
                carrinho.push(banco[cod]);
                total += banco[cod].preco;
                atualizarCupom();
                document.getElementById('leitor').value = '';
            } else { alert("Produto não encontrado!"); }
        }
    }

    function atualizarCupom() {
        const tbody = document.querySelector("#tabela-cupom tbody");
        tbody.innerHTML = carrinho.map(i => `<tr><td>${i.nome}</td><td>R$ ${i.preco.toFixed(2)}</td></tr>`).join('');
        document.getElementById('total').innerText = `Total: R$ ${total.toFixed(2)}`;
    }

    function importarCSV(event, tipo) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const linhas = e.target.result.split('\n');
            linhas.forEach(l => {
                const col = l.split(',');
                if (col.length < 2) return;
                const cod = col[0].replace(/"/g, '').trim();
                const valor = col[1].replace(/"/g, '').trim();

                if(!banco[cod]) banco[cod] = { nome: "Produto Desconhecido", preco: 0 };
                if (tipo === 'nomes') banco[cod].nome = valor;
                else banco[cod].preco = parseFloat(valor.replace(',', '.'));
            });
            alert("Base de dados atualizada!");
        };
        reader.readAsText(event.target.files[0]);
    }

    function finalizarVenda() {
        alert("Venda registrada com sucesso!");
        carrinho = []; total = 0; atualizarCupom();
    }
</script>
</body>
</html>
